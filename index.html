<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>AI App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
      padding: 50px;
    }

    h1 {
      margin-bottom: 30px;
    }

    input {
      width: 320px;
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px 20px;
      margin-left: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #4caf50;
      color: white;
      font-weight: bold;
    }

    #output {
      margin-top: 30px;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
      min-height: 60px;
      width: 60%;
      margin-left: auto;
      margin-right: auto;
      text-align: right;
    }
  </style>
</head>

<body>

  <h1>🧠 AI System</h1>

  <input id="input" placeholder="اكتب سؤالك هنا">
  <button onclick="ask()">إرسال</button>

  <div id="output">النتيجة ستظهر هنا...</div>

  <script>
    async function ask() {

      let input = document.getElementById("input").value;

      document.getElementById("output").innerText = "جاري التفكير...";

      try {

        // 🔥 لاحقًا سنربطه بالذكاء الحقيقي
        let response = await fetch("/api", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ input })
        });

        let data = await response.json();

        document.getElementById("output").innerText = data.output;

      } catch (error) {

        // إذا لم يكن السيرفر جاهز
        document.getElementById("output").innerText =
          "رد محلي (بدون سيرفر): " + input;

      }
    }
  </script>

</body>
</html>
