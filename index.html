<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AI Chat</title>

  <style>

    body {
      margin: 0;
      padding: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      width: 90%;
      max-width: 700px;
      margin: 50px auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .chat-box {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      min-height: 300px;
      max-height: 500px;
      overflow-y: auto;
      margin-bottom: 20px;
      white-space: pre-wrap;
    }

    .message {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .user {
      background: #333;
    }

    .ai {
      background: #1f3d2a;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      background: #4caf50;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>🧠 AI Chat</h1>

    <div class="chat-box" id="chatBox">

      <div class="message ai">
        مرحبًا 👋
        اكتب أي رسالة للبدء.
      </div>

    </div>

    <div class="input-area">

      <input
        type="text"
        id="input"
        placeholder="اكتب رسالتك هنا..."
      >

      <button onclick="askAI()">
        إرسال
      </button>

    </div>

  </div>

  <script>

    async function askAI() {

      const input = document.getElementById("input");
      const chatBox = document.getElementById("chatBox");

      const message = input.value.trim();

      if (!message) return;

      chatBox.innerHTML += `
        <div class="message user">
          ${message}
        </div>
      `;

      const loadingId = "loading-" + Date.now();

      chatBox.innerHTML += `
        <div class="message ai" id="${loadingId}">
          جاري التفكير...
        </div>
      `;

      chatBox.scrollTop = chatBox.scrollHeight;

      input.value = "";

      try {

        const response = await fetch(
          "https://mmmmmmm-khaki.vercel.app/api/chat",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              input: message
            })
          }
        );

        const data = await response.json();

        document.getElementById(loadingId).innerHTML =
          data.output || data.error || "لا يوجد رد";

      } catch (error) {

        document.getElementById(loadingId).innerHTML =
          "فشل الاتصال بالسيرفر";

        console.error(error);

      }

      chatBox.scrollTop = chatBox.scrollHeight;

    }

  </script>

</body>
</html>
