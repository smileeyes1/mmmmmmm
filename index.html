<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AI Chat</title>

  <style>

    body {
      margin: 0;
      padding: 0;
      background: #0f0f0f;
      font-family: Arial, sans-serif;
      color: white;
    }

    .container {
      width: 90%;
      max-width: 700px;
      margin: 50px auto;
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
    }

    .chat-box {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      min-height: 300px;
      text-align: right;
      overflow-y: auto;
      margin-bottom: 20px;
      white-space: pre-wrap;
    }

    .message {
      margin-bottom: 15px;
      padding: 12px;
      border-radius: 10px;
    }

    .user {
      background: #2d2d2d;
    }

    .ai {
      background: #1f3d2a;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 16px;
    }

    button {
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      background: #4caf50;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>🧠 AI Chat</h1>

    <div class="chat-box" id="chatBox">
      <div class="message ai">
        مرحبًا 👋
        اكتب أي شيء للبدء.
      </div>
    </div>

    <div class="input-area">
      <input
        type="text"
        id="input"
        placeholder="اكتب رسالتك هنا..."
      />

      <button onclick="askAI()">
        إرسال
      </button>
    </div>

  </div>

  <script>

    async function askAI() {

      const input = document.getElementById("input");
      const chatBox = document.getElementById("chatBox");

      const message = input.value.trim();

      if (!message) return;

      // رسالة المستخدم
      chatBox.innerHTML += `
        <div class="message user">
          ${message}
        </div>
      `;

      // رسالة انتظار
      const loadingId = "loading-" + Date.now();

      chatBox.innerHTML += `
        <div class="message ai" id="${loadingId}">
          جاري التفكير...
        </div>
      `;

      chatBox.scrollTop = chatBox.scrollHeight;

      input.value = "";

      try {

        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            input: message
          })
        });

        const data = await response.json();

        document.getElementById(loadingId).innerHTML =
          data.output || data.error || "لا يوجد رد";

      } catch (error) {

        document.getElementById(loadingId).innerHTML =
          "فشل الاتصال بالسيرفر";

      }

      chatBox.scrollTop = chatBox.scrollHeight;

    }

  </script>

</body>
</html>
